linters:
  enable:
    - errcheck
    - gofmt
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused

linters-settings:
  errcheck:
    check-type-assertions: false
    check-blank: false
  govet:
    enable-all: true
    disable:
      - fieldalignment
  staticcheck:
    checks:
      - all

issues:
  exclude-use-default: true
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    # Test files often intentionally ignore errors
    - path: _test\.go
      linters:
        - errcheck
    # Unused methods may be needed for future features
    - path: internal/cluster/manager\.go
      text: "is unused"
      linters:
        - unused
